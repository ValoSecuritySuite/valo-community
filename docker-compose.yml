version: "3.9"

# Valo Community Edition

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_EDITION=community
      - APP_ENFORCEMENT_MODE=monitor
      - APP_LOG_LEVEL=INFO
      - APP_RATE_LIMIT=100/minute
      - APP_CORRELATION_ENGINE_ENABLED=false
      - APP_EXECUTIVE_METRICS_ENABLED=false
      - APP_REPORTS_ENABLED=false
      - APP_PLAYBOOKS_ENABLED=false
      - APP_LEARNING_LOOP_ENABLED=false
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_VALO_EDITION: community
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
