id: revoke_and_alert_secret_exposure
name: Revoke session and ticket on secret exposure
description: |
  When the policy engine flags a secret-exposure rule, immediately revoke
  the request's session, quarantine the originating connector, and open
  a tracking ticket for the SOC.
enabled: true
priority: 80
when:
  - field: source
    op: eq
    value: valo
  - field: matched_policy_ids
    op: contains
    value: block_secret_exposure
then:
  - action: revoke
    params:
      target: session
      reason: leaked_credential
  - action: quarantine
    params:
      kind: connector
      reason: secret_exposure
  - action: ticket
    params:
      provider: github
      project: valo-incidents
      title: Valo blocked a secret-exposure prompt
      labels:
        - valo
        - secret-leak
        - ai-firewall
  - action: alert
    params:
      channel: soc_high_severity
      severity: critical
      title: Valo blocked secret exposure in a prompt
tags:
  - compliance:soc2
  - secret-leak
version: 1
