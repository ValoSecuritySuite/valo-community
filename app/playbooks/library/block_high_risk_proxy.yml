id: block_high_risk_proxy
name: Block high-risk LLM calls and alert SOC
description: |
  When a Valo enforcement outcome reports a critical-severity decision on
  the egress proxy, re-affirm the inline block, alert the SOC, and rate-
  limit the offending session for ten minutes to slow follow-up attempts.
enabled: true
priority: 90
when:
  - field: source
    op: eq
    value: valo
  - field: event_type
    op: eq
    value: enforcement.outcome
  - field: severity
    op: in
    value: ["high", "critical"]
  - field: raw.route
    op: contains
    value: /v1/proxy/chat/completions
then:
  - action: block
    params:
      reason: high_risk_llm_call
  - action: alert
    params:
      channel: soc_high_severity
      severity: high
      title: Valo blocked a high-risk LLM call
  - action: rate_limit
    params:
      requests: 5
      window_seconds: 60
      duration_seconds: 600
tags:
  - ai-firewall
  - severity:high
version: 1
