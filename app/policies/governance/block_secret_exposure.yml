id: block_secret_exposure
name: Block secret exposure
description: |
  Deny any prompt whose context rules flagged a secret keyword
  (password, api_key, bearer token, ...) appearing in the input.
enabled: true
enforce: true
when:
  - field: matched_rule_ids
    op: contains
    value: secret_signal
then:
  decision: deny
  severity: 8
  message: Prompt contains secret-like material (password / api_key / bearer token).
tags:
  - compliance:soc2
  - secret-leak
version: 1
